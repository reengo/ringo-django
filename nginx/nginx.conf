server {
    listen 80;
    server_name ringo.loc;

    root /var/www/ringo;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    location /static/ {
        expires 1y;
        add_header Cache-Control "public";
    }
}

server {
    listen 80;
    server_name api.ringo.loc;

    # Use Docker's embedded DNS so nginx re-resolves the upstream on each
    # request rather than caching the IP at startup (prevents stale-IP 502s)
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $upstream http://api:8000;

    location /static/ {
        alias /var/www/static/;
        expires 1y;
        add_header Cache-Control "public";
    }

    location / {
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
