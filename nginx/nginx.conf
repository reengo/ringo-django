server_tokens off;

# ── Security headers applied to every response ────────────────────────────────
map $sent_http_content_type $csp {
    default "default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com; style-src 'self' 'unsafe-inline' https://unpkg.com https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' http://api.ringo.loc https://api.ringo.loc; frame-ancestors 'none';";
}

server {
    listen 80;
    server_name ringo.loc;

    root /var/www/ringo;
    index index.html;

    add_header X-Frame-Options            "DENY"                               always;
    add_header X-Content-Type-Options     "nosniff"                            always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"    always;
    add_header Permissions-Policy         "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy    $csp                                 always;

    location / {
        try_files $uri /index.html;
    }

    location /static/ {
        expires 1y;
        add_header Cache-Control "public";
    }
}

server {
    listen 80;
    server_name api.ringo.loc;

    add_header X-Frame-Options            "DENY"                               always;
    add_header X-Content-Type-Options     "nosniff"                            always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"    always;

    # Use Docker's embedded DNS so nginx re-resolves the upstream on each
    # request rather than caching the IP at startup (prevents stale-IP 502s)
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $upstream http://api:8000;

    location /static/ {
        alias /var/www/static/;
        expires 1y;
        add_header Cache-Control "public";
    }

    location / {
        proxy_pass $upstream;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
