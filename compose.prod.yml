services:
  nginx:
    image: nginx:latest
    container_name: ringo-nginx
    depends_on:
      api:
        condition: service_healthy
      app:
        condition: service_completed_successfully
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx:/etc/nginx/conf.d
      - frontend_dist:/var/www/ringo  # named volume written by app container
      - static_volume:/var/www/static
    networks:
      - ringo_net
  api:
    build: ./backend/
    container_name: ringo-django
    command: >
      sh -c "
      python manage.py makemigrations --noinput &&
      python manage.py migrate &&
      python manage.py createsuperuser --noinput || true &&
      python manage.py collectstatic --noinput &&
      gunicorn backend.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - static_volume:/app/static
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.socket(); s.settimeout(3); s.connect(('localhost', 8000)); s.close()\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - ringo_net
  app:
    build:
      context: ./frontend
      target: production
      args:
        - REACT_APP_API_URL=${REACT_APP_API_URL}
        - REACT_APP_TARGET_EMAIL=${REACT_APP_TARGET_EMAIL}
        - REACT_APP_EMAIL_SERVICE=${REACT_APP_EMAIL_SERVICE}
        - REACT_APP_EMAIL_APP_ID=${REACT_APP_EMAIL_APP_ID}
        - REACT_APP_EMAIL_TEMPLATE=${REACT_APP_EMAIL_TEMPLATE}
        - REACT_APP_EMAIL_PUBLIC_KEY=${REACT_APP_EMAIL_PUBLIC_KEY}
        - REACT_APP_SOCIALS_GITHUB=${REACT_APP_SOCIALS_GITHUB}
        - REACT_APP_SOCIALS_LINKEDIN=${REACT_APP_SOCIALS_LINKEDIN}
        - REACT_APP_SOCIALS_INSTAGRAM=${REACT_APP_SOCIALS_INSTAGRAM}
        - REACT_APP_SOCIALS_X=${REACT_APP_SOCIALS_X}
        - REACT_APP_CV_LINK=${REACT_APP_CV_LINK}
    container_name: ringo-react
    # /app/build exists in the image (not shadowed); copy to named volume for nginx
    command: sh -c "cp -r /app/build/. /dist/ && echo 'React build deployed'"
    volumes:
      - frontend_dist:/dist
    networks:
      - ringo_net
volumes:
  node_modules:
  static_volume:
  frontend_dist:

networks:
  ringo_net:
    driver: bridge
